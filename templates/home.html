<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Exam Performance Indicator</title>
</head>
<body>

    <h1>Student Exam Performance Indicator</h1>

    <form action="{{ url_for('predict_datapoint') }}" method="post">

        <legend><h2>Student Exam Performance Prediction</h2></legend>

        <label>Gender</label><br>
        <select name="gender" required>
            <option selected disabled value="">Select your Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <br><br>

        <label>Race or Ethnicity</label><br>
        <select name="race_ethnicity" required>
            <option selected disabled value="">Select Ethnicity</option>
            <option value="group A">Group A</option>
            <option value="group B">Group B</option>
            <option value="group C">Group C</option>
            <option value="group D">Group D</option>
            <option value="group E">Group E</option>
        </select>

        <br><br>

        <label>Parental Level of Education</label><br>
        <select name="parental_level_of_education" required>
            <option selected disabled value="">Select Parent Education</option>
            <option value="associate's degree">associate's degree</option>
            <option value="bachelor's degree">bachelor's degree</option>
            <option value="high school">high school</option>
            <option value="master's degree">master's degree</option>
            <option value="some college">some college</option>
            <option value="some high school">some high school</option>
        </select>

        <br><br>

        <label>Lunch Type</label><br>
        <select name="lunch" required>
            <option selected disabled value="">Select Lunch Type</option>
            <option value="free/reduced">free/reduced</option>
            <option value="standard">standard</option>
        </select>

        <br><br>

        <label>Test Preparation Course</label><br>
        <select name="test_preparation_course" required>
            <option selected disabled value="">Select Test Course</option>
            <option value="none">None</option>
            <option value="completed">Completed</option>
        </select>

        <br><br>

        <label>Reading Score out of 100</label><br>
        <input
            type="number"
            name="reading_score"
            placeholder="Enter your Reading Score"
            min="0"
            max="100"
            required
        >

        <br><br>

        <label>Writing Score out of 100</label><br>
        <input
            type="number"
            name="writing_score"
            placeholder="Enter your Writing Score"
            min="0"
            max="100"
            required
        >

        <br><br>

        <input type="submit" value="Predict your Maths Score">

    </form>

    <h2>{{ results }}</h2>

</body>
</html>
