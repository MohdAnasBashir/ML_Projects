<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Exam Performance Indicator</title>
    <style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:40px;
    background:linear-gradient(-45deg,#667eea,#764ba2,#6dd5ed,#2193b0);
    background-size:400% 400%;
    animation:bg 12s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

h1{
    color:white;
    font-size:42px;
    margin-bottom:25px;
    text-align:center;
    text-shadow:0 5px 20px rgba(0,0,0,.3);
}

form{
    width:500px;
    max-width:95%;
    padding:40px;
    border-radius:25px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.3);
    box-shadow:0 25px 45px rgba(0,0,0,.25);
}

legend h2{
    color:white;
    text-align:center;
    margin-bottom:25px;
}

label{
    color:white;
    font-weight:500;
}

select,
input[type="number"]{
    width:100%;
    margin-top:8px;
    padding:14px 18px;
    border:none;
    border-radius:12px;
    outline:none;
    font-size:15px;
    background:rgba(255,255,255,.9);
    transition:.35s;
}

select:hover,
input:hover{
    transform:translateY(-2px);
}

select:focus,
input:focus{
    transform:scale(1.02);
    box-shadow:0 0 20px rgba(255,255,255,.5);
}

input[type="submit"]{
    width:100%;
    padding:16px;
    border:none;
    border-radius:50px;
    background:linear-gradient(90deg,#ff512f,#dd2476);
    color:white;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    transition:.35s;
}

input[type="submit"]:hover{
    transform:translateY(-4px) scale(1.03);
    box-shadow:0 15px 30px rgba(221,36,118,.5);
}

input[type="submit"]:active{
    transform:scale(.98);
}

h2:last-child{
    margin-top:25px;
    color:white;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(12px);
    padding:18px 35px;
    border-radius:15px;
    box-shadow:0 15px 35px rgba(0,0,0,.25);
    text-align:center;
}

</style>
</head>
<body>

    <h1>Student Exam Performance Indicator</h1>

    <form action="{{ url_for('predict_datapoint') }}" method="post">

        <legend><h2>Student Exam Performance Prediction</h2></legend>

        <label>Gender</label><br>
        <select name="gender" required>
            <option selected disabled value="">Select your Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <br><br>

        <label>Race or Ethnicity</label><br>
        <select name="race_ethnicity" required>
            <option selected disabled value="">Select Ethnicity</option>
            <option value="group A">Group A</option>
            <option value="group B">Group B</option>
            <option value="group C">Group C</option>
            <option value="group D">Group D</option>
            <option value="group E">Group E</option>
        </select>

        <br><br>

        <label>Parental Level of Education</label><br>
        <select name="parental_level_of_education" required>
            <option selected disabled value="">Select Parent Education</option>
            <option value="associate's degree">associate's degree</option>
            <option value="bachelor's degree">bachelor's degree</option>
            <option value="high school">high school</option>
            <option value="master's degree">master's degree</option>
            <option value="some college">some college</option>
            <option value="some high school">some high school</option>
        </select>

        <br><br>

        <label>Lunch Type</label><br>
        <select name="lunch" required>
            <option selected disabled value="">Select Lunch Type</option>
            <option value="free/reduced">free/reduced</option>
            <option value="standard">standard</option>
        </select>

        <br><br>

        <label>Test Preparation Course</label><br>
        <select name="test_preparation_course" required>
            <option selected disabled value="">Select Test Course</option>
            <option value="none">None</option>
            <option value="completed">Completed</option>
        </select>

        <br><br>

        <label>Reading Score out of 100</label><br>
        <input
            type="number"
            name="reading_score"
            placeholder="Enter your Reading Score"
            min="0"
            max="100"
            required
        >

        <br><br>

        <label>Writing Score out of 100</label><br>
        <input
            type="number"
            name="writing_score"
            placeholder="Enter your Writing Score"
            min="0"
            max="100"
            required
        >

        <br><br>

        <input type="submit" value="Predict your Maths Score">

    </form>

    <h2>{{ results }}</h2>

</body>
</html>
